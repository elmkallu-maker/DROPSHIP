<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORDIC SHELL | Reimagining Outdoor Luxury | Modular Sovereignty</title>
    <style>
        /* === NORDIC SHELL LUXURY STYLING === */
        :root {
            --bg-color: #050505;
            --text-main: #FFFFFF;
            --text-secondary: #CCCCCC;
            --accent: #D4AF37; /* Refined Gold */
            --section-bg: #0A0A0A;
            --border: #1A1A1A;
            --font-header: 'Helvetica Neue', Arial, sans-serif;
            --font-body: 'Georgia', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }
        h1, h2, h3, h4 { font-family: var(--font-header); font-weight: 300; text-transform: uppercase; letter-spacing: 3px; }
        h1 { font-size: 3rem; color: var(--text-main); margin-bottom: 20px; }
        h2 { font-size: 2rem; color: var(--accent); margin-bottom: 1rem; text-align: center; }
        h3 { font-size: 1.5rem; color: var(--text-main); margin-bottom: 10px; }
        p { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 1.1rem; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        img { max-width: 100%; height: auto; display: block; border: 1px solid var(--border); }
